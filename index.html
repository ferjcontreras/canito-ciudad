<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canito en la Ciudad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #0d1117; font-family: system-ui, -apple-system, sans-serif; color: white; }

    #loading-overlay {
      position: fixed; inset: 0; background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    .loading-box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .loading-box h1 {
      font-size: 2.6rem; font-weight: 800;
      background: linear-gradient(135deg, #7ee0a0 0%, #b5d4fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.02em;
    }
    .loading-box .subtitle { font-size: 0.9rem; color: #8b949e; letter-spacing: 0.05em; text-transform: uppercase; }
    .spinner {
      width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #7ee0a0; border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-size: 0.85rem; color: #8b949e; min-height: 1.2em; }
    #loading-error { display: none; color: #ff6b6b; font-size: 0.85rem; max-width: 360px; line-height: 1.5; }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    #coords-bar {
      position: absolute; top: 14px; right: 14px;
      background: rgba(13,17,23,0.82); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      padding: 8px 14px; font-size: 0.72rem; color: #8b949e;
      font-family: 'SF Mono', 'Fira Code', monospace; line-height: 1.6;
    }
    #coords-bar span { color: #c9d1d9; }
    #title-bar {
      position: absolute; top: 14px; left: 14px;
      background: rgba(13,17,23,0.82); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      padding: 10px 16px; font-size: 0.95rem; color: #c9d1d9; font-weight: 700;
    }
    #title-bar small { display: block; font-weight: 400; color: #8b949e; font-size: 0.72rem; margin-top: 2px; }
    #controls-bar {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(13,17,23,0.82); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 22px;
      padding: 9px 22px; font-size: 0.76rem; color: #8b949e; white-space: nowrap;
    }
    kbd {
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 5px; padding: 2px 7px; font-family: inherit; font-size: 0.76rem; color: #c9d1d9;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-box">
      <h1>Canito en la Ciudad</h1>
      <p class="subtitle">Mendoza viva · Three.js</p>
      <div class="spinner"></div>
      <p id="loading-msg">Inicializando…</p>
      <p id="loading-error"></p>
    </div>
  </div>

  <div id="hud">
    <div id="title-bar">🐶 Canito en la Ciudad<small>Paseá por Mendoza</small></div>
    <div id="coords-bar">Lat <span id="hud-lat">–</span> &nbsp; Lon <span id="hud-lon">–</span></div>
    <div id="controls-bar">
      <kbd>↑↓←→</kbd> o <kbd>WASD</kbd> mover &nbsp;|&nbsp; <kbd>Shift</kbd> correr
    </div>
  </div>

  <script type="module" src="/src/cityLife.ts"></script>
</body>
</html>
